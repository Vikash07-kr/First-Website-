<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard | Sweet Delights</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="page-fade-in">
    <nav class="navbar glass-nav" style="background:var(--footer-bg);">
        <h1 class="logo" style="color:var(--primary);">🧁 Admin Dashboard</h1>
        <ul class="nav-links">
            <li><a href="index.html" style="color:rgba(255,255,255,0.7);">← Live Site</a></li>
            <li><button id="theme-toggle" class="theme-btn" style="border-color:rgba(255,255,255,0.2);color:white;">🌙</button></li>
        </ul>
    </nav>

    <div style="padding:120px 24px 20px;max-width:1000px;margin:0 auto;">
        <h2 style="color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:12px;font-size:2rem;margin-bottom:24px;">Business Overview 📊</h2>
        <div class="admin-stats-container">
            <div class="stat-card"><h3>Total Orders</h3><p id="admin-total-orders">0</p></div>
            <div class="stat-card"><h3>Total Revenue</h3><p id="admin-total-revenue">$0.00</p></div>
            <div class="stat-card"><h3>Reviews</h3><p id="admin-total-reviews">0</p></div>
        </div>
        <div style="background:var(--card-bg);padding:24px;border-radius:18px;margin-bottom:32px;box-shadow:var(--shadow-sm);border:1px solid var(--border-subtle);">
            <h3 style="margin-top:0;color:var(--primary);">Revenue Split 📈</h3>
            <canvas id="revenueChart" style="max-height:280px;"></canvas>
        </div>
    </div>

    <div style="padding:0 24px 20px;max-width:1000px;margin:0 auto;">
        <h2 style="color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:12px;font-size:1.8rem;margin-bottom:24px;">Manage Orders 📦</h2>
        <div id="admin-orders-container" style="display:flex;flex-direction:column;gap:18px;"></div>
    </div>

    <div style="padding:20px 24px 80px;max-width:1000px;margin:0 auto;">
        <h2 style="color:var(--primary);border-bottom:2px solid var(--primary);padding-bottom:12px;font-size:1.8rem;margin-bottom:24px;">Manage Reviews 🌟</h2>
        <div id="admin-reviews-container" style="display:flex;flex-direction:column;gap:18px;"></div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reviewsEl = document.getElementById('admin-total-reviews');
            if (reviewsEl) {
                const reviews = JSON.parse(localStorage.getItem('bakeryReviews')) || [];
                reviewsEl.textContent = reviews.length;
            }
        });
    </script>
</body>
</html>
